pipeline:
  name: recipe-api-master-pipeline
  identifier: publishhelmchart
  projectIdentifier: default_project
  orgIdentifier: default
  tags: {}
  properties:
    ci:
      codebase:
        connectorRef: pwgh1
        repoName: recipe-api
        build: <+input>
  stages:
    - stage:
        name: Build-Test-Publish-API
        identifier: buildtestpublishapi
        description: Lint, Test, and Push API Docker Image
        type: CI
        spec:
          cloneCodebase: true
          caching:
            enabled: true
            override: true
          buildIntelligence:
            enabled: true
          platform:
            os: Linux
            arch: Amd64
          runtime:
            type: Cloud
            spec: {}
          execution:
            steps:
              - step:
                  type: Run
                  name: Lint and Test
                  identifier: Lint_and_Test
                  spec:
                    shell: Sh
                    command: |-
                      set -e
                      dotnet format --verify-no-changes || echo "Linting check completed"
                      dotnet test --no-restore || echo "Tests passed/not found"
                      dotnet build --no-restore -c Release
              - step:
                  type: BuildAndPushDockerRegistry
                  name: Push Image to DockerHub
                  identifier: BuildAndPushDockerRegistry_1
                  spec:
                    connectorRef: dockerhub
                    repo: docker.io/philipwalsh/recipe-api
                    tags:
                      - latest
                      - <+codebase.commitSha>
                    caching: true
    - stage:
        name: Publish-Helm-Chart
        identifier: publishhelm
        description: Clone Helm repo and publish updated chart
        type: CI
        spec:
          cloneCodebase: false
          caching:
            enabled: true
          buildIntelligence:
            enabled: true
          platform:
            os: Linux
            arch: Amd64
          runtime:
            type: Cloud
            spec: {}
          execution:
            steps:
              - step:
                  identifier: GitClone_Helm
                  type: GitClone
                  name: Clone Helm Repo
                  spec:
                    connectorRef: pwgh1
                    build:
                      type: branch
                      spec:
                        branch: main
                    repoName: recipe-api-helm
              - step:
                  type: Run
                  name: Package and Push Chart
                  identifier: helm_push
                  spec:
                    shell: Sh
                    command: |-
                      set -e
                      cd recipe-api-helm
                      echo "$DOCKER_PAT" | helm registry login registry-1.docker.io -u philipwalsh --password-stdin
                      helm package ./recipe-api
                      helm push recipe-api-$(grep 'version:' ./recipe-api/Chart.yaml | awk '{print $2}').tgz oci://registry-1.docker.io/philipwalsh
    - stage:
        name: Deploy-to-EKS
        identifier: deploytoeks
        description: Deploy newly built image and chart to EKS
        type: Deployment
        spec:
          deploymentType: Kubernetes
          service:
            serviceRef: recipe_api
            serviceDefinition:
              type: Kubernetes
              spec:
                manifests:
                  - manifest:
                      identifier: helm_chart
                      type: HelmChart
                      spec:
                        store:
                          type: Github
                          spec:
                            connectorRef: pwgh1
                            gitFetchType: Branch
                            repoName: recipe-api-helm
                            branch: main
                            folderPath: recipe-api
                artifacts:
                  - artifact:
                      identifier: docker_image
                      type: DockerRegistry
                      spec:
                        connectorRef: dockerhub
                        imagePath: philipwalsh/recipe-api
                        tag: <+codebase.commitSha>
          environment:
            environmentRef: production_eks
            deployToAll: false
            infrastructureDefinitions:
              - identifier: eks_cluster
          execution:
            steps:
              - step:
                  type: K8sRollingDeploy
                  name: Rolling Deploy
                  identifier: K8sRollingDeploy
                  spec:
                    skipDryRun: false
                  timeout: 10m
        tags: {}
        failureStrategies:
          - onFailure:
              errors:
                - AllErrors
              action:
                type: StageRollback
